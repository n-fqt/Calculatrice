<!DOCTYPE html>
<html lang="fr">

<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <table id="calculatrice">
        <tr>
            <th colspan="4">Calculatrice</th>
        </tr>
        <tr>
            <td colspan="4">
                <input type="text" id="resultat" readonly>
            </td>
        </tr>
        <tr>
            <th id="7">7</th>
            <th id="8">8</th>
            <th id="9">9</th>
            <th id="multiple">*</th>
        </tr>
        <tr>
            <th id="4">4</th>
            <th id="5">5</th>
            <th id="6">6</th>
            <th id="plus">+</th>
        </tr>
        <tr>
            <th id="1">1</th>
            <th id="2">2</th>
            <th id="3">3</th>
            <th id="minus">-</th>
        </tr>
        <tr>
            <th id="0">0</th>
            <th id="erase">C</th>
            <th id="equal">=</th>
            <th id="divide">/</th>
        </tr>
    </table>
</body>

</html>
